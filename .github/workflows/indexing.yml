name: Google Indexing Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Berjalan otomatis setiap jam 12 malam
  workflow_dispatch: # Tombol "Run workflow" manual

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # PENTING: Memberikan izin agar bot bisa menyimpan file ke repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests google-auth tqdm google-api-python-client

      - name: Run Script
        env:
          INDEXER_CONFIG: ${{ secrets.INDEXER_CONFIG }}
        run: python main.py

      - name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Menambahkan semua file yang dihasilkan oleh script
          git add indexed_urls.txt index.html sitemap.xml
          
          # Melakukan commit hanya jika ada perubahan
          git commit -m "Update database, index, and sitemap [skip ci]" || exit 0
          
          # Mengirim perubahan kembali ke repository
          git push
