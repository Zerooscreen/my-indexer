name: Google Indexing Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # PENTING agar bot bisa menyimpan file

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests google-auth tqdm

      - name: Run Script
        env:
          INDEXER_CONFIG: ${{ secrets.INDEXER_CONFIG }}
        run: python main.py

      - name: Save Indexed URLs List
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f indexed_urls.txt ]; then
            git add indexed_urls.txt
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update indexed list" && git push)
          fi
